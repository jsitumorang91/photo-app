<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BITbyBIT Photo Storage</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #121212; color: white; }
        header { background: #1f1f1f; padding: 15px; text-align: center; border-bottom: 2px solid #8cc63f; }
        .controls { padding: 20px; display: flex; gap: 10px; justify-content: center; background: #1a1a1a; }
        .breadcrumb { padding: 10px 20px; background: #252525; cursor: pointer; color: #8cc63f; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        .item { background: #2a2a2a; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; transition: 0.3s; }
        .item:hover { transform: scale(1.05); background: #333; }
        .item img { width: 100%; height: 150px; object-fit: cover; }
        .folder-icon { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 50px; background: #333; }
        
        .item-label { padding: 10px; text-align: center; font-size: 13px; }
        .actions { position: absolute; top: 5px; right: 5px; display: none; flex-direction: column; gap: 5px; }
        .item:hover .actions { display: flex; }
        .btn-mini { font-size: 10px; padding: 3px; cursor: pointer; border: none; border-radius: 3px; }

        /* Floating Paste Bar */
        #pasteBar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #8cc63f; color: black; padding: 15px 30px; 
            border-radius: 50px; display: none; gap: 20px; align-items: center; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<header><h2>BITbyBIT Photo Manager</h2></header>

<div class="controls">
    <input type="file" id="photoInput">
    <button onclick="uploadPhoto()">Upload</button>
    <button onclick="makeFolder()">+ Folder Baru</button>
</div>

<div class="breadcrumb" id="breadcrumb" onclick="goHome()">Home <span id="pathLabel"></span></div>

<div class="gallery" id="gallery"></div>

<div id="pasteBar">
    <span id="clipInfo"></span>
    <button onclick="executePaste()">Paste Di Sini</button>
    <button onclick="cancelClip()">Batal</button>
</div>

<script>
    let currentPath = "";
    let clipboard = { action: null, sourcePath: null, name: "" };

    async function loadItems() {
        const res = await fetch(`/items?path=${currentPath}`);
        const items = await res.json();
        document.getElementById('pathLabel').innerText = currentPath ? " / " + currentPath : "";
        
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = items.map(item => `
            <div class="item">
                <div class="actions">
                    <button class="btn-mini" onclick="copyMove(event, 'copy', '${item.path}', '${item.name}')">Copy</button>
                    <button class="btn-mini" onclick="copyMove(event, 'move', '${item.path}', '${item.name}')">Move</button>
                    <button class="btn-mini" style="background:red; color:white;" onclick="deleteItem(event, '${item.path}')">X</button>
                </div>
                <div onclick="${item.isFolder ? `enterFolder('${item.path}')` : `window.open('${item.url}')`}">
                    ${item.isFolder ? '<div class="folder-icon">📁</div>' : `<img src="${item.url}">`}
                    <div class="item-label">${item.name}</div>
                </div>
            </div>
        `).join('');
    }

    function enterFolder(path) { currentPath = path; loadItems(); }
    function goHome() { currentPath = ""; loadItems(); }

    function copyMove(e, action, path, name) {
        e.stopPropagation();
        clipboard = { action, sourcePath: path, name };
        document.getElementById('clipInfo').innerText = `${action.toUpperCase()}: ${name}`;
        document.getElementById('pasteBar').style.display = 'flex';
    }

    async function executePaste() {
        await fetch('/transfer-item', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                action: clipboard.action, 
                sourcePath: clipboard.sourcePath, 
                destinationPath: currentPath 
            })
        });
        cancelClip();
        loadItems();
    }

    function cancelClip() { document.getElementById('pasteBar').style.display = 'none'; }

    async function makeFolder() {
        const name = prompt("Nama folder baru:");
        if (!name) return;
        await fetch('/create-folder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ folderName: name, currentPath })
        });
        loadItems();
    }

    async function uploadPhoto() {
        const fileInput = document.getElementById('photoInput');
        if (!fileInput.files[0]) return;
        const formData = new FormData();
        formData.append('photo', fileInput.files[0]);
        formData.append('folder', currentPath);
        await fetch('/upload', { method: 'POST', body: formData });
        loadItems();
    }

    async function deleteItem(e, path) {
        e.stopPropagation();
        if(!confirm("Hapus item ini?")) return;
        await fetch('/delete', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ itemPath: path })
        });
        loadItems();
    }

    loadItems();
</script>
</body>
</html>
