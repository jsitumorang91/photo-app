<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BITbyBIT Neon Storage</title>
    <style>
        body { 
            margin: 0; background: #0a0a0a url('https://image.onrender.com/jsitumorang91/photo-app/image_f42b88.png') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: sans-serif; 
        }
        .overlay { background: rgba(0,0,0,0.7); min-height: 100vh; padding: 20px; }
        header { border-bottom: 2px solid #8cc63f; padding-bottom: 10px; text-align: center; text-shadow: 0 0 10px #8cc63f; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        button { background: #8cc63f; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:hover { box-shadow: 0 0 15px #8cc63f; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .item { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border-radius: 10px; padding: 10px; position: relative; text-align: center; }
        .item img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .folder-icon { font-size: 60px; cursor: pointer; }
        
        .actions { position: absolute; top: 5px; right: 5px; display: none; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 5px; }
        .item:hover .actions { display: flex; flex-direction: column; gap: 5px; }
        .btn-small { font-size: 10px; padding: 5px; background: #333; color: white; }

        #pasteBar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #8cc63f; color: black; padding: 15px; border-radius: 50px; 
            display: none; gap: 15px; align-items: center; box-shadow: 0 0 20px #8cc63f;
        }
    </style>
</head>
<body>
<div class="overlay">
    <header><h1>BITbyBIT Photo Manager</h1></header>

    <div class="controls">
        <input type="file" id="photoInput">
        <button onclick="uploadPhoto()">Upload</button>
        <button onclick="addFolder()">+ Folder</button>
    </div>

    <div id="breadcrumb" style="margin-bottom: 20px; cursor: pointer; color: #8cc63f;" onclick="goHome()">Home / <span id="pathDisplay"></span></div>

    <div class="gallery" id="gallery"></div>

    <div id="pasteBar">
        <span id="clipText"></span>
        <button onclick="pasteItem()" style="background: white;">Paste Here</button>
        <button onclick="cancelClip()" style="background: #ff4444; color: white;">X</button>
    </div>
</div>

<script>
    let currentPath = "";
    let clipboard = null;

    async function loadItems() {
        const res = await fetch(`/items?path=${currentPath}`);
        const items = await res.json();
        document.getElementById('pathDisplay').innerText = currentPath;
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = items.map(item => `
            <div class="item">
                <div class="actions">
                    <button class="btn-small" onclick="prepAction('copy', '${item.path}', '${item.name}')">Copy</button>
                    <button class="btn-small" onclick="prepAction('move', '${item.path}', '${item.name}')">Move</button>
                    <button class="btn-small" onclick="renameItem('${item.path}', '${item.name}')">Rename</button>
                    <button class="btn-small" style="color:red" onclick="deleteItem('${item.path}')">Del</button>
                </div>
                ${item.isFolder ? `<div class="folder-icon" onclick="enterFolder('${item.path}')">📁</div>` : `<img src="${item.url}">`}
                <div style="margin-top:5px; font-size:12px;">${item.name}</div>
            </div>
        `).join('');
    }

    function enterFolder(path) { currentPath = path; loadItems(); }
    function goHome() { currentPath = ""; loadItems(); }

    function prepAction(action, path, name) {
        clipboard = { action, path, name };
        document.getElementById('clipText').innerText = `${action.toUpperCase()}: ${name}`;
        document.getElementById('pasteBar').style.display = 'flex';
    }

    async function pasteItem() {
        await fetch('/transfer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: clipboard.action, source: clipboard.path, destFolder: currentPath })
        });
        cancelClip(); loadItems();
    }

    function cancelClip() { document.getElementById('pasteBar').style.display = 'none'; clipboard = null; }

    async function renameItem(path, oldName) {
        const newName = prompt("Nama baru:", oldName);
        if (!newName) return;
        await fetch('/rename', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ oldPath: path, newName })
        });
        loadItems();
    }

    async function addFolder() {
        const name = prompt("Nama folder:");
        if (!name) return;
        await fetch('/create-folder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, path: currentPath })
        });
        loadItems();
    }

    async function deleteItem(path) {
        if (!confirm("Hapus?")) return;
        await fetch('/delete', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ path })
        });
        loadItems();
    }

    async function uploadPhoto() {
        const file = document.getElementById('photoInput').files[0];
        if (!file) return;
        const fd = new FormData(); fd.append('photo', file); fd.append('folder', currentPath);
        await fetch('/upload', { method: 'POST', body: fd });
        loadItems();
    }

    loadItems();
</script>
</body>
</html>
