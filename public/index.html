<style>
    .clipboard-bar { 
        background: #3c4043; color: white; padding: 10px; 
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        border-radius: 25px; display: none; gap: 15px; align-items: center; z-index: 1000;
    }
    .action-menu { position: absolute; bottom: 5px; right: 5px; display: flex; gap: 5px; opacity: 0; }
    .item:hover .action-menu { opacity: 1; }
    .btn-small { font-size: 10px; padding: 4px; background: white; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
</style>

<div id="clipboardBar" class="clipboard-bar">
    <span id="clipboardLabel"></span>
    <button onclick="pasteItem()" style="background: #1a73e8; color: white; border: none; padding: 5px 15px; border-radius: 15px;">Paste Here</button>
    <button onclick="clearClipboard()" style="background: none; color: white; border: none; cursor: pointer;">Cancel</button>
</div>

<script>
    let clipboard = { action: null, sourcePath: null, fileName: "" };

    // Update inside loadItems() map function:
    // Replace the innerHTML part with this logic to include Copy/Move buttons
    function renderGallery(items) {
        gallery.innerHTML = items.map(item => `
            <div class="item ${item.isFolder ? 'folder' : ''}" onclick="${item.isFolder ? `MapsTo('${item.path}')` : `openPreview('${item.url}')`}">
                <button class="delete-btn" onclick="deleteItem(event, '${item.path}')">🗑</button>
                
                ${item.isFolder ? '<div style="font-size:50px">📁</div>' : `<img src="${item.url}">`}
                <div style="padding:8px; font-size:12px; text-align:center;">${item.name}</div>

                ${!item.isFolder ? `
                <div class="action-menu">
                    <button class="btn-small" onclick="setClipboard(event, 'copy', '${item.path}', '${item.name}')">Copy</button>
                    <button class="btn-small" onclick="setClipboard(event, 'move', '${item.path}', '${item.name}')">Move</button>
                </div>` : ''}
            </div>
        `).join('');
    }

    function setClipboard(event, action, path, name) {
        event.stopPropagation();
        clipboard = { action, sourcePath: path, fileName: name };
        document.getElementById('clipboardBar').style.display = "flex";
        document.getElementById('clipboardLabel').innerText = `${action === 'copy' ? 'Copying' : 'Moving'}: ${name}`;
    }

    async function pasteItem() {
        const endpoint = clipboard.action === 'copy' ? '/copy-item' : '/move-item';
        await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                sourcePath: clipboard.sourcePath, 
                destinationFolder: currentPath 
            })
        });
        clearClipboard();
        loadItems();
    }

    function clearClipboard() {
        clipboard = { action: null, sourcePath: null, fileName: "" };
        document.getElementById('clipboardBar').style.display = "none";
    }

    // ... rest of your existing navigateTo, loadItems, etc.
</script>
