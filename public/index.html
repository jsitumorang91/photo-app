<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Repo Publik</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; }
        .upload-section { background: white; padding: 20px; border-bottom: 1px solid #ddd; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        button { padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="upload-section">
        <h2>My Photo Repository</h2>
        <input type="file" id="photoInput" accept="image/*">
        <button onclick="uploadPhoto()">Upload Photo</button>
    </div>
    <div class="gallery" id="gallery"></div>

    <script>
        const gallery = document.getElementById('gallery');

        async function loadPhotos() {
            try {
                const res = await fetch('/photos'); // Memanggil API internal server
                const data = await res.json();
                gallery.innerHTML = data.map(p => `<img src="${p.url}">`).join('');
            } catch (err) { console.error("Error load:", err); }
        }

        async function uploadPhoto() {
            const fileInput = document.getElementById('photoInput');
            if (!fileInput.files[0]) return alert("Pilih foto dulu");

            const formData = new FormData();
            formData.append('photo', fileInput.files[0]);

            try {
                await fetch('/upload', { method: 'POST', body: formData });
                fileInput.value = '';
                loadPhotos();
            } catch (err) { alert("Upload gagal"); }
        }

        loadPhotos();
    </script>
</body>
</html>
